name: Deploy Skills Page

on:
  push:
    branches:
      - main
    paths:
      - "skills/**"
      - "scripts/**"
      - "pyproject.toml"
      - "Makefile"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-main
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & deploy to gh-pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6

      - name: Generate skills page
        run: make pages

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          destination_dir: .
          keep_files: true   # preserve any pr-preview/ subfolders
