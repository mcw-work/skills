name: Deploy Skills Page

on:
  push:
    branches:
      - main
    paths:
      - "skills/**"
      - "scripts/generate_skills_page.py"
      - "pyproject.toml"
      - "Makefile"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; cancel queued runs but not in-progress ones.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Generate site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6

      - name: Generate skills page
        run: make pages

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
