name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - "skills/**"
      - "scripts/**"
      - "pyproject.toml"
      - "Makefile"

permissions:
  contents: write
  pull-requests: write

# Shared group with pages.yml — serialises all gh-pages writes to prevent push conflicts.
concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  deploy-preview:
    name: Build and deploy PR preview
    runs-on: ubuntu-latest
    # Only deploy previews for PRs from branches in this repo, not forks, to avoid needing to set up secrets for fork PRs.
    if: github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6

      - name: Generate skills page
        run: make pages

      - name: Deploy PR preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./docs
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: deploy

  cleanup-preview:
    name: Clean up PR preview
    runs-on: ubuntu-latest
    if: github.event.action == 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4

      # Deletes gh-pages/pr-preview/pr-{N}/ and posts a cleanup comment on the PR
      - name: Remove PR preview
        uses: rossjrw/pr-preview-action@v1
        with:
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: remove
